spring:
  datasource:
    url: jdbc:h2:mem:badmishop;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console
